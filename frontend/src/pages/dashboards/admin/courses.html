<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Courses - Admin Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="../../../../src/assets/images/company-img/favicon.svg" />

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Marcellus&family=Unbounded:wght@200..900&display=swap" rel="stylesheet">

    <!-- styles -->
    <link rel="stylesheet" href="../../../../src/assets/css/vendor/bootstrap.min.css" />
    <link rel="stylesheet" href="../../../../src/assets/css/vendor/font-awesome-all.css" />
    <link rel="stylesheet" href="../../../../src/assets/css/base.css" />
    <link rel="stylesheet" href="../../../../src/assets/css/components.css" />
    <link rel="stylesheet" href="../../../../src/assets/css/pages.css" />
</head>

<body class="admin-body">
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="adminSidebar">
            <div class="sidebar-header">
                <a href="index.html">
                    <img src="../../../../src/assets/images/company-img/dark-logo.svg" alt="G Design Logo" class="sidebar-logo">
                </a>
                <button class="sidebar-close d-lg-none" id="sidebarClose">
                    <i class="fal fa-times"></i>
                </button>
            </div>
            
            <nav class="sidebar-nav">
                <ul class="sidebar-menu">
                    <li class="menu-item"><a href="index.html"><i class="fal fa-home"></i> Dashboard</a></li>
                    <li class="menu-item"><a href="requests.html"><i class="fal fa-clipboard-list-check"></i> Requests</a></li>
                    <li class="menu-item active"><a href="courses.html"><i class="fal fa-graduation-cap"></i> Courses</a></li>
                    <li class="menu-item"><a href="#"><i class="fal fa-users"></i> Users</a></li>
                    <li class="menu-item"><a href="#"><i class="fal fa-cog"></i> Settings</a></li>
                </ul>
            </nav>
            
            <div class="sidebar-footer" style="padding: 20px;">
                <button class="admin-btn secondary w-100" id="logoutBtn" style="color: var(--status-error); border-color: rgba(239, 68, 68, 0.2);">
                    <i class="fal fa-sign-out-alt mr-2" style="margin-right: 8px;"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="admin-main">
            <!-- Header -->
            <header class="admin-header">
                <div class="header-left">
                    <button class="sidebar-toggle d-lg-none" id="sidebarToggle">
                        <i class="fal fa-bars"></i>
                    </button>
                    <h2 class="header-title">Manage Courses</h2>
                </div>
            </header>

            <!-- Content -->
            <main class="admin-content">
                <div class="view-container">
                    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap" style="gap: 15px;">
                        <p style="color: var(--admin-text-muted); margin: 0;">Build and manage your learning curriculum.</p>
                        <div class="d-flex align-items-center" style="gap: 15px;">
                            <input type="text" class="admin-input" id="searchCourse" placeholder="Search courses..." style="max-width: 200px;">
                            <button class="admin-btn" id="createNewCourseBtn"><i class="fal fa-plus mr-2" style="margin-right: 8px;"></i> Create Course</button>
                        </div>
                    </div>
                    
                    <div class="admin-card">
                        <div class="admin-table-container">
                            <table class="admin-table">
                                <thead>
                                    <tr>
                                        <th>Course Title</th>
                                        <th>Price</th>
                                        <th>Created Date</th>
                                        <th class="text-right">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="coursesTableBody">
                                    <tr>
                                        <td colspan="4" class="text-center" style="padding: 40px;"><i class="fas fa-spinner fa-spin mr-2"></i> Loading courses...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Create/Edit Course Modal -->
    <div id="courseModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;">
        <div class="admin-card" style="width: 100%; max-width: 500px; animation: slideUp 0.3s ease;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="card-title m-0" id="courseModalTitle">Create New Course</h3>
                <button class="action-btn" onclick="$('#courseModal').hide()"><i class="fal fa-times"></i></button>
            </div>
            <form id="courseForm">
                <input type="hidden" id="cId">
                <div class="form-group mb-3">
                    <label class="form-label">Course Title</label>
                    <input type="text" class="admin-input" id="cTitle" required placeholder="e.g. UI/UX Masterclass">
                </div>
                <div class="form-group mb-3">
                    <label class="form-label">Description</label>
                    <textarea class="admin-input" id="cDesc" rows="3" required placeholder="Brief description..."></textarea>
                </div>
                <div class="form-group mb-3">
                    <label class="form-label">Thumbnail URL (Optional)</label>
                    <input type="url" class="admin-input" id="cThumb" placeholder="https://...">
                </div>
                <div class="form-group mb-4" id="statusGroup" style="display:none;">
                    <label class="form-label">Status</label>
                    <select class="admin-input" id="cStatus">
                        <option value="draft">Draft</option>
                        <option value="published">Published</option>
                    </select>
                </div>
                <div class="d-flex justify-content-end gap-2" style="gap: 10px;">
                    <button type="button" class="admin-btn secondary" onclick="$('#courseModal').hide()">Cancel</button>
                    <button type="submit" class="admin-btn" id="saveCourseBtn">Create Course</button>
                </div>
            </form>
        </div>
    </div>

    <script> window.ROOT_PATH = "../../../.."; </script>
    <script src="../../../../src/assets/js/vendor/jquery-latest.js"></script>
    <script src="../../../../src/assets/js/core/auth.js"></script>
    <script src="../../../../src/api/adminCourses.js"></script>
    <script src="../../../../src/utils/helpers.js"></script>
    
    <script>
        $(document).ready(async function() {
            if (!window.auth || !window.auth.isAuthenticated()) {
                window.location.href = '../../auth/login.html';
                return;
            }

            let allCourses = [];

            const renderCourses = (courses) => {
                let html = '';
                if (courses.length === 0) {
                    html = '<tr><td colspan="4" class="text-center" style="padding: 40px; color: var(--admin-text-muted);">No courses found.</td></tr>';
                } else {
                    courses.forEach(c => {
                        const date = new Date(c.created_at).toLocaleDateString();
                        const statusClass = c.status === 'published' ? 'status-success' : 'status-warning';
                        const statusLabel = c.status === 'published' ? 'Published' : 'Draft';
                        const thumb = c.thumbnail ? `<img src="${c.thumbnail}" style="width: 40px; height: 30px; object-fit: cover; border-radius: 4px; margin-right: 10px;">` : `<div style="width: 40px; height: 30px; background: #eee; border-radius: 4px; margin-right: 10px; display:inline-block;"></div>`;
                        
                        html += `
                            <tr>
                                <td><div class="d-flex align-items-center">${thumb} <strong>${c.title}</strong> <span class="status-badge ${statusClass}" style="margin-left: 10px; font-size: 11px;">${statusLabel}</span></div></td>
                                <td>${c.price ? '$'+c.price : 'Free'}</td>
                                <td>${date}</td>
                                <td class="text-right">
                                    <button class="action-btn edit-course-btn" data-id="${c.id}" title="Edit"><i class="fal fa-edit"></i></button>
                                    <button class="action-btn delete-course-btn text-danger" data-id="${c.id}" title="Delete"><i class="fal fa-trash-alt"></i></button>
                                    <a href="course-builder.html?id=${c.id}" class="admin-btn" style="padding: 6px 12px; font-size: 13px; margin-left: 10px;"><i class="fal fa-pencil-paintbrush mr-2" style="margin-right: 6px;"></i> Builder</a>
                                </td>
                            </tr>
                        `;
                    });
                }
                $('#coursesTableBody').html(html);
                bindRowEvents();
            };

            const loadCourses = async () => {
                const res = await window.adminCoursesApi.getCourses();
                if (res && res.ok) {
                    allCourses = res.data.results || res.data;
                    renderCourses(allCourses);
                } else {
                    $('#coursesTableBody').html('<tr><td colspan="4" class="text-center text-danger">Failed to load courses.</td></tr>');
                }
            };

            $('#searchCourse').on('input', function() {
                const q = $(this).val().toLowerCase();
                const filtered = allCourses.filter(c => c.title.toLowerCase().includes(q));
                renderCourses(filtered);
            });

            $('#createNewCourseBtn').click(() => {
                $('#courseForm')[0].reset();
                $('#cId').val('');
                $('#courseModalTitle').text('Create New Course');
                $('#saveCourseBtn').text('Create Course');
                $('#statusGroup').hide();
                $('#courseModal').css('display', 'flex');
            });

            const bindRowEvents = () => {
                $('.edit-course-btn').off('click').on('click', function() {
                    const id = $(this).data('id');
                    const course = allCourses.find(c => c.id == id);
                    if(course) {
                        $('#cId').val(course.id);
                        $('#cTitle').val(course.title);
                        $('#cDesc').val(course.description);
                        $('#cThumb').val(course.thumbnail || '');
                        $('#cStatus').val(course.status || 'draft');
                        
                        $('#courseModalTitle').text('Edit Course');
                        $('#saveCourseBtn').text('Save Changes');
                        $('#statusGroup').show();
                        $('#courseModal').css('display', 'flex');
                    }
                });

                $('.delete-course-btn').off('click').on('click', async function() {
                    if (confirm("Are you sure you want to delete this course? This action cannot be undone.")) {
                        const id = $(this).data('id');
                        const res = await window.adminCoursesApi.deleteCourse(id);
                        if(res && res.ok) {
                            if (window.showToast) window.showToast('success', 'Course deleted.');
                            await loadCourses();
                        } else {
                            if (window.showToast) window.showToast('error', 'Failed to delete course.');
                        }
                    }
                });
            };

            $('#courseForm').submit(async function(e) {
                e.preventDefault();
                const btn = $('#saveCourseBtn');
                const origText = btn.text();
                btn.prop('disabled', true).text('Saving...');
                
                const id = $('#cId').val();
                const payload = {
                    title: $('#cTitle').val(),
                    description: $('#cDesc').val(),
                    thumbnail: $('#cThumb').val() || null,
                    status: $('#cStatus').val() || 'draft'
                };

                let res;
                if (id) {
                    res = await window.adminCoursesApi.updateCourse(id, payload);
                } else {
                    res = await window.adminCoursesApi.createCourse(payload);
                }

                if (res && res.ok) {
                    if (window.showToast) window.showToast('success', id ? 'Course updated!' : 'Course created!');
                    $('#courseModal').hide();
                    await loadCourses();
                    if (!id) window.location.href = `course-builder.html?id=${res.data.id}`;
                } else {
                    if (window.showToast) window.showToast('error', 'Failed to save course');
                }
                btn.prop('disabled', false).text(origText);
            });

            await loadCourses();
            
            $('#logoutBtn').click(() => { window.auth.logout(); });
        });
    </script>
</body>
</html>
