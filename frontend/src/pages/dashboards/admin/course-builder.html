<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Course Builder - Admin Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="../../../../src/assets/images/company-img/favicon.svg" />

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Marcellus&family=Unbounded:wght@200..900&display=swap" rel="stylesheet">

    <!-- styles -->
    <link rel="stylesheet" href="../../../../src/assets/css/vendor/bootstrap.min.css" />
    <link rel="stylesheet" href="../../../../src/assets/css/vendor/font-awesome-all.css" />
    <link rel="stylesheet" href="../../../../src/assets/css/base.css" />
    <link rel="stylesheet" href="../../../../src/assets/css/components.css" />
    <link rel="stylesheet" href="../../../../src/assets/css/pages.css" />

    <style>
        .builder-layout {
            display: flex;
            height: calc(100vh - 80px);
            gap: 20px;
            overflow: hidden;
        }
        .builder-sidebar {
            width: 350px;
            background: white;
            border-radius: 12px;
            border: 1px solid var(--admin-border);
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            overflow: hidden;
        }
        .builder-sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--admin-border);
            background: #f9fafb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .builder-sidebar-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .builder-editor {
            flex-grow: 1;
            background: white;
            border-radius: 12px;
            border: 1px solid var(--admin-border);
            padding: 30px;
            overflow-y: auto;
        }
        
        /* Drag Items */
        .module-item {
            background: white;
            border: 1px solid var(--admin-border);
            border-radius: 8px;
            margin-bottom: 10px;
            overflow: hidden;
        }
        .module-item-header {
            padding: 12px 15px;
            background: #f8f9fa;
            font-weight: 600;
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .drag-handle {
            cursor: grab;
            color: var(--admin-text-muted);
            margin-right: 10px;
        }
        .drag-handle:active {
            cursor: grabbing;
        }
        .module-lessons-container {
            padding: 5px 10px;
            min-height: 20px;
        }
        .lesson-item {
            padding: 10px 15px;
            background: white;
            border: 1px solid #eaeaea;
            border-radius: 6px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            font-size: 14px;
            cursor: pointer;
        }
        .lesson-item:hover, .module-item-header:hover {
            border-color: var(--admin-accent);
        }
        .lesson-item.active, .module-item-header.active {
            background: rgba(59, 130, 246, 0.05);
            border-left: 3px solid var(--admin-accent);
        }
        .sortable-ghost {
            opacity: 0.4;
            background: #f0f4f8;
        }
        .empty-editor {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--admin-text-muted);
        }
    </style>
</head>

<body class="admin-body">
    <div class="admin-layout">
        <!-- Minimal Sidebar -->
        <aside class="admin-sidebar" id="adminSidebar">
            <div class="sidebar-header">
                <a href="index.html">
                    <img src="../../../../src/assets/images/company-img/dark-logo.svg" alt="G Design Logo" class="sidebar-logo">
                </a>
            </div>
            
            <nav class="sidebar-nav">
                <ul class="sidebar-menu">
                    <li class="menu-item"><a href="courses.html"><i class="fal fa-arrow-left"></i> Back to Courses</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="admin-main">
            <header class="admin-header">
                <div class="header-left">
                    <h2 class="header-title" id="topCourseTitle">Loading Builder...</h2>
                </div>
            </header>

            <main class="admin-content">
                <div class="view-container">
                    <div class="builder-layout">
                        
                        <!-- Left Structure Panel -->
                        <div class="builder-sidebar">
                            <div class="builder-sidebar-header">
                                <h3 style="font-size: 16px; font-weight: 600; margin: 0;">Curriculum</h3>
                                <button class="action-btn" id="btnAddModule" title="Add Module"><i class="fal fa-folder-plus"></i></button>
                            </div>
                            <div class="builder-sidebar-content" id="modulesContainer">
                                <div class="text-center p-4"><i class="fas fa-spinner fa-spin"></i> Loading curriculum...</div>
                            </div>
                        </div>

                        <!-- Right Editor Panel -->
                        <div class="builder-editor" id="editorPanel">
                            <div class="empty-editor">
                                <i class="fal fa-pencil-paintbrush mb-3" style="font-size: 48px; color: var(--admin-border);"></i>
                                <h4>Select an item to edit</h4>
                                <p>Click on a module or lesson to edit its details.</p>
                            </div>
                        </div>

                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script> window.ROOT_PATH = "../../../.."; </script>
    <script src="../../../../src/assets/js/vendor/jquery-latest.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="../../../../src/assets/js/core/auth.js"></script>
    <script src="../../../../src/api/adminCourses.js"></script>
    <script src="../../../../src/utils/helpers.js"></script>
    <script src="../../../../src/assets/js/modules/admin/course-builder.js"></script>
</body>
</html>
