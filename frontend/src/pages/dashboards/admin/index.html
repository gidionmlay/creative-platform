<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - G Design</title>
    <link rel="icon" type="image/svg+xml" href="../../../../src/assets/images/company-img/favicon.svg" />

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Marcellus&family=Unbounded:wght@200..900&display=swap" rel="stylesheet">

    <!-- existing styles -->
    <link rel="stylesheet" href="../../../../src/assets/css/vendor/bootstrap.min.css" />
    <link rel="stylesheet" href="../../../../src/assets/css/vendor/animate.min.css" />
    <link rel="stylesheet" href="../../../../src/assets/css/vendor/font-awesome-all.css" />
    <link rel="stylesheet" href="../../../../src/assets/css/base.css" />
    <link rel="stylesheet" href="../../../../src/assets/css/components.css" />
    
    <!-- Admin styles -->
    <link rel="stylesheet" href="../../../../src/assets/css/pages.css" />
    </head>

<body class="admin-body">
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="adminSidebar">
            <div class="sidebar-header">
                <a href="../../../../src/pages/public/index.html">
                    <img src="../../../../src/assets/images/company-img/dark-logo.svg" alt="G Design Logo" class="sidebar-logo">
                </a>
                <button class="sidebar-close d-lg-none" id="sidebarClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <nav class="sidebar-nav">
                <ul class="sidebar-menu">
                    <li class="menu-item active" data-view="dashboard">
                        <a href="#"><i class="fal fa-chart-pie"></i> Dashboard</a>
                    </li>
                    <li class="menu-item" data-view="requests">
                        <a href="#"><i class="fal fa-inbox-in"></i> Requests</a>
                    </li>
                    <li class="menu-item" data-view="users">
                        <a href="#"><i class="fal fa-users"></i> Users</a>
                    </li>
                    <li class="menu-item" data-view="projects">
                        <a href="#"><i class="fal fa-folder-open"></i> Projects</a>
                    </li>
                    <li class="menu-item" data-view="orders">
                        <a href="#"><i class="fal fa-shopping-cart"></i> Orders</a>
                    </li>
                    <li class="menu-item" data-view="training">
                        <a href="#"><i class="fal fa-graduation-cap"></i> Training</a>
                    </li>
                    <li class="menu-item" data-view="services">
                        <a href="#"><i class="fal fa-cogs"></i> Services CMS</a>
                    </li>
                    <li class="menu-item" data-view="media">
                        <a href="#"><i class="fal fa-photo-video"></i> Media Library</a>
                    </li>

                </ul>
                
                <div class="sidebar-bottom">
                    <ul class="sidebar-menu">
                        <li class="menu-item" data-view="settings">
                            <a href="#"><i class="fal fa-cog"></i> Settings</a>
                        </li>
                    </ul>
                </div>
            </nav>
        </aside>

        <!-- Main Content Wrapper -->
        <div class="admin-main">
            <!-- Top Navbar -->
            <header class="admin-header">
                <div class="header-left">
                    <button class="sidebar-toggle d-lg-none" id="sidebarToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h2 class="page-title" id="pageTitle">Dashboard</h2>
                </div>
                
                <div class="header-right">
                    <div class="header-action notification-box">
                        <button class="action-btn">
                            <i class="fal fa-bell"></i>
                            <span class="notification-badge">3</span>
                        </button>
                    </div>
                    
                    <div class="header-action profile-box">
                        <div class="profile-dropdown-trigger" id="profileDropdownTrigger">
                            <div class="profile-avatar">
                                <span>—</span>
                            </div>
                            <div class="profile-info d-none d-md-block">
                                <span class="profile-name">Loading...</span>
                                <span class="profile-role">—</span>
                            </div>
                            <i class="fal fa-chevron-down"></i>
                        </div>
                        
                        <div class="profile-dropdown-menu" id="profileDropdown">
                            <a href="#" class="dropdown-item" data-view-trigger="settings"><i class="fal fa-user"></i> My Profile</a>
                            <a href="#" class="dropdown-item"><i class="fal fa-cog"></i> Account Settings</a>
                            <div class="dropdown-divider"></div>
                            <a href="#" class="dropdown-item text-danger" data-action="logout"><i class="fal fa-sign-out"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Dynamic View Container -->
            <main class="admin-content" id="adminContent">
                <!-- Views will be injected here by admin.js -->
            </main>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal fade" id="viewRequestModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Request Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="viewRequestModalBody">
                    <!-- Populated by JS -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="rejectRequestModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Reject Request</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="rejectRequestForm">
                        <input type="hidden" id="rejectRequestId">
                        <div class="mb-3">
                            <label for="rejectReason" class="form-label">Reason for rejection <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="rejectReason" rows="3" required></textarea>
                        </div>
                        <div class="d-flex justify-content-end mt-4">
                            <button type="button" class="admin-btn secondary me-2" style="margin-right: 10px;" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="admin-btn" style="background-color: var(--status-danger);">Reject Request</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="userProfileModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">User Profile</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="userProfileModalBody">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- JS Scripts -->
    <script> window.ROOT_PATH = "../../../.."; </script>
    <script src="../../../../src/assets/js/vendor/jquery-latest.js"></script>
    <script src="../../../../src/assets/js/vendor/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../../../../src/assets/js/core/auth.js"></script>
    <script src="../../../../src/assets/js/core/dashboard-guard.js"></script>
    <script src="../../../../src/api/api.js"></script>
    <script src="../../../../src/utils/helpers.js"></script>
    
    <!-- Admin Modules -->
    <script src="../../../../src/api/services.js"></script>
    <script src="../../../../src/api/media.js"></script>
    <script src="../../../../src/api/projects.js"></script>
    <script src="../../../../src/assets/js/modules/admin/cms.services.js"></script>
    <script src="../../../../src/assets/js/modules/admin/cms.media.js"></script>
    <script src="../../../../src/assets/js/modules/admin/requests.js"></script>
    <script src="../../../../src/assets/js/modules/admin/projects.js"></script>
    <script src="../../../../src/assets/js/modules/admin/analytics.js"></script>
    <script src="../../../../src/assets/js/modules/admin/kpis.js"></script>
    <script src="../../../../src/assets/js/modules/admin/charts.js"></script>
    <script src="../../../../src/assets/js/modules/admin/activity.js"></script>
    <script src="../../../../src/assets/js/modules/admin/dashboard.js"></script>
    <script src="../../../../src/assets/js/modules/admin/users.js"></script>
    
    <!-- Main Router -->
    <script src="../../../../src/assets/js/modules/admin.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.auth && !window.auth.isAuthenticated()) {
                const root = window.ROOT_PATH || '';
                window.location.href = root + '/src/pages/auth/login.html';
            }
        });
    </script>
</body>
</html>
